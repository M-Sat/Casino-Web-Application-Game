<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette - Casino Royale</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/roulette.css">
    <link rel="stylesheet" href="css/loading.css">
    <link rel="icon" href="images/casino.png" type="image/png">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <img src="images/casino.png" alt="Casino" class="loading-logo">
            <h1 class="loading-title">Loading Roulette...</h1>
            <div class="loading-spinner"></div>
            <div class="loading-progress-container">
                <div id="loading-progress-bar"></div>
            </div>
            <div id="loading-progress-text">Loading... 0%</div>
        </div>
    </div>

    <!-- Main Content Wrapper -->
    <div id="main-content-wrapper">
        <div class="game-container roulette-container">
        <header class="game-header">
            <div class="balance-display">
                <span class="balance-label">Balance:</span>
                <span id="roulette-balance" class="balance-amount">€0.00</span>
            </div>
            <button id="back-to-main" class="back-button">← Back to Casino</button>
        </header>

        <div class="roulette-area">
            <div class="wheel-column">
                <div class="wheel-frame">
                    <img id="roulette-idle" src="images/0.png" alt="Roulette wheel idle" style="display: block;">
                    <video id="roulette-video" width="450" height="450" playsinline muted style="display: none;"></video>
                    <div id="spin-overlay" class="spin-overlay">Spinning</div>
                    <div id="spin-result" class="spin-result"></div>
                </div>

            </div>

            <aside class="betting-column">
                <section class="betting-section">


                    <div id="bet-grid" class="bet-grid" aria-label="Roulette betting grid">
                        <!-- Number grid and bet controls will be generated by JS -->
                    </div>

                    <div class="history">
                        <h4>Last spins</h4>
                        <div id="last-spins" class="last-spins"></div>
                    </div>
                </section>
                <!-- Betting controls moved below betting section -->
                <div class="bet-controls">
                    <label>Bet Amount (€):</label>
                    <div id="bet-amount-display" class="bet-amount-display">€0.00</div>
                    <div class="chip-container">
                        <img src="images/chips/chip1.png" alt="1€ chip" class="chip" data-value="1">
                        <img src="images/chips/chip5.png" alt="5€ chip" class="chip" data-value="5">
                        <img src="images/chips/chip25.png" alt="25€ chip" class="chip" data-value="25">
                        <img src="images/chips/chip50.png" alt="50€ chip" class="chip" data-value="50">
                        <img src="images/chips/chip100.png" alt="100€ chip" class="chip" data-value="100">
                    </div>
                    <button id="spin-button" class="play-button">SPIN</button>
                    <button id="clear-bet-button" class="clear-bet-button">Clear Bet</button>
                </div>
            </aside>
        </div>

        <div class="result-section">
            <div id="result-message" class="result-message"></div>
        </div>

        </div>
    </div>

    <script src="js/preloader.js"></script>
    <script src="js/roulette.js"></script>
</body>
</html>
